kind = "web"
previewPath = "/"
title = "World Capo"
version = "1.0.0"
id = "artifacts/world-capo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24560

[services.development]
run = "pnpm --filter @workspace/world-capo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/world-capo", "run", "build" ]
publicDir = "artifacts/world-capo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24560"
BASE_PATH = "/"
